<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title class="mt-5 text-center text-primary fw-bold">Todo Application</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .text-strikethrough{
        text-decoration: line-through;
        color:#6c757d;
        opacity:0.7;
        }
    </style>
</head>
<body style="background: linear-gradient(135deg, #667eea, #764ba2);">


<div class="container mt-5 p-4 rounded shadow" style="background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); color:white;">
    <h1 class = "mt-3 text-center" style="text-shadow: 2px 2px 10px rgba(0,0,0,0.3);">Todo Application</h1>
    <form action="/"  method="post" class="row mt-3">
        <div class="col-md-10">
            <input class="form-control form-control-lg" type="text" name = "title" placeholder="Add a new task......" required>
        </div>
        <div class="col-md-2">
            <button type="submit" class="btn btn-dark btn-lg w-100" >Add</button>
        </div>
    </form>
    <div class="mt-4">
     <th:block th:each="task : ${tasks}">
        <div class="card mb-2 shadow-sm">
            <div class="card-body d-flex justify-content-between align-items-center">
                <span th:classappend="${task.completed} ? 'text-strikethrough'" th:text="${task.title}">Task Title</span>
                <div>
                    <a th:href="@{/{id}/toggle(id=${task.id})}" class="btn btn-outline-secondary btn-sm">Toggle</a>
                    <a th:href="@{/{id}/delete(id=${task.id})}" class="btn btn-outline-danger btn-sm">Delete</a>

                </div>
            </div>

        </div>

     </th:block>
    </div>
</div>
</body>
</html>
